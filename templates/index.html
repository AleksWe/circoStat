<!DOCTYPE html>
<html lang="en">
<style>
    * {
      font-family: Arial;
    }
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link href="{{ url_for('static', path='/css/styles.css') }}" rel="stylesheet">
    <script src="/static/js/fasta_tables.js" defer></script>

    <title>CircoStat</title>

</head>
<body>
    <div class="shadow p-3 mb-2 bg-primary bg-gradient text-white"><h1>CircoStat - a compact statistical analysis visualizer </h1></div><br>
    <div class="ml-1 fs-5 fw-semibold text-primary">Select analyses:</div>
    <div class="ml-1 form-text">P_DIV available only after selecting any of the other two options.</div>
    <form action="http://localhost:8000/upload" method="post" enctype="multipart/form-data" id="form2">
        <div class="w-25 col-md-4">
            <div class="card inset">
                <div class="form-check">
                    <input class="ml-1 fs-5 form-check-input" type="checkbox" name="options" value="SNP" id="SNP" onchange="toggleSendButton()">
                    <label class="ml-1 fs-5 form-check-label" for="SNP">
                    SNP
                </label></div><br>
                <div class="form-check">
                    <input class="ml-1 fs-5 form-check-input" type="checkbox" name="options" value="IND" id="IND" onchange="toggleSendButton()">
                    <label class="ml-1 fs-5 form-check-label" for="IND">
                    IND
                </label></div><br>
                <div class="form-check">
                    <input class="ml-1 fs-5 form-check-input" type="checkbox" name="options" value="P_DIV" id="P_DIV" disabled>
                    <label class="ml-1 fs-5 form-check-label" for="P_DIV">
                    P_DIV
                </label></div>
            </div>
        </div>
        <div class="w-40 col-md-4">
            <div class="card inset">
                <div class="form-check">
                    <input class="ml-1 fs-5 form-check-input" type="checkbox" name="options" value="is_Alignment" id="is_Alignment">
                    <label class="ml-1 fs-5 form-check-label" for="is_Alignment">
                    Check this box if uploaded .fasta file is an alignment.
                </label></div><br>
            </div>
        </div>
        <script type="text/javascript" src="/static/js/chart_details.js"></script><br>
        <div class="ml-1 fs-5 fw-semibold text-primary">Submit all necessary files:</div>
        <div class="ml-1 form-text" id="basic-addon4">(such as gene_name.txt, karyotype etc...)</div><br>
        <input class="w-25 ml-1 d-inline form-control" type="file" id="fileInput" name="files" multiple required><br><br>
        <div class="table-responsive">
            <div id="tableContainer" style="display:none;">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Fasta name</th>
                        <th>Group</th>
                    </tr>
                    </thead>
                    <tbody id="fastaTable"></tbody>
                </table>
            </div>
        </div>
        <input type="submit" value="Submit" class="ml-1 btn btn-primary">
    </form>
<link rel="stylesheet" href="/static/js/bootstrap.min.js">
<script src="/js/datatable_passer.js" defer></script>
</body>
</html>
